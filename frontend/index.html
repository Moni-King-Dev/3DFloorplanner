<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3DFloorplanner</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; }
        .container { border: 2px dashed #ccc; padding: 20px; text-align: center; }
        pre { background: #f4f4f4; padding: 10px; text-align: left; overflow: auto; height: 400px; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; font-size: 16px; }
        .status { margin-top: 10px; font-weight: bold; }
        .online { color: green; }
        .offline { color: red; }
    </style>
</head>
<body>

    <h1>3DFloorplanner – Floor Plan Scanner</h1>
    
    <p>Server Status: <span id="server-check">Checking...</span></p>

    <div class="container">
        <input type="file" id="fileInput" accept="image/*">
        <br><br>
        <button onclick="uploadImage()">Analyze Floor Plan</button>
    </div>

    <p id="status" class="status"></p>
    
    <h3>Result (JSON Blueprint):</h3>
    <pre id="output">Waiting for upload...</pre>

    <script>
        // Check if backend is running
        fetch("http://127.0.0.1:8000/")
            .then(() => {
                document.getElementById('server-check').innerText = "✅ Online";
                document.getElementById('server-check').className = "online";
            })
            .catch(() => {
                document.getElementById('server-check').innerText = "❌ OFFLINE (Run python main.py)";
                document.getElementById('server-check').className = "offline";
            });

        async function uploadImage() {
            const fileInput = document.getElementById('fileInput');
            const output = document.getElementById('output');
            const status = document.getElementById('status');

            if (fileInput.files.length === 0) {
                alert("Please select a file!");
                return;
            }

            const formData = new FormData();
            formData.append("file", fileInput.files[0]);

            status.innerText = "⏳ Sending to AI... (Please wait 5-10s)";
            output.innerText = "Processing...";

            try {
                const response = await fetch("http://127.0.0.1:8000/analyze", {
                    method: "POST",
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.detail) {
                    throw new Error(data.detail);
                }

                status.innerText = "✅ Success!";
                output.innerText = JSON.stringify(data, null, 4); 
            } catch (error) {
                status.innerText = "❌ Error: " + error.message;
                output.innerText = "Failed. Check the Backend Terminal for details.";
            }
        }
    </script>
</body>
</html>
